body:
  text: 蘇子微生與婦人期不來水至抱梁柱而死歐陽詢藝文類聚卷九原注或作尾生車渠瑪瑙生於荒外今冀州之土曾未得其奇也藝文類聚卷八十四蜀郡鄧公呼吸成霧徐堅初學記卷二太平御覽卷十五行務應規步慮投矩文選陸士衡長安有狹邪行李善注夫人生一代若朝露之託於桐葉耳其與幾何後漢書王符傳章懷太子注太平御覽卷十二夫帶方寸之印丈八之組戴貂鶡之尾建千丈之城遊五里之衢走卒警蹕叫呼而行此諸侯之所謂榮華時俗之所謂富貴也太平御覽卷四百六十九天子坐九重之內樹塞其門旒以翳明衡以隱聽鸞以抑馳太平御覽卷七十六不食八珍何以知味之奇不為文學何以知世之資太平御覽卷六百立君臣設尊卑杜將漸防未萌莫過乎禮哀王道傷舊政莫過乎詩導陰陽示悔吝莫過乎易明善惡著廢興吐辭令莫過乎春秋量遠近賦九州莫過乎尚書和人情動風俗莫過乎樂治刑名審法度莫過乎商韓載百王紀治亂莫過乎史漢孟軻之徒溷淆其間世人見其才易登其意易過於是家著一書人書一法雅人君子投筆硯而高視太平御覽卷六百八房麗者趙之賢人立東門之外有行商車轄亡麗告之不悟復更告商人怒曰吾轄自亡何須汝告惠加於己而反怒之吾欲比之草木草木有心矣太平御覽卷七百七十三蘭以芳自燒膏以肥自𤋲翠以羽殃身蚌以珠破體是以公孫賀得丞而啼泣知滿之有毀晨之有暮象以牙喪身不能去其白薰以芳自燒不能去其香太平御覽卷九百八十三人而不學譬之視肉而食史記李斯傳司馬貞索隱引莊子及蘇子
